name: Build

on:
  push:
    branches:
      - main
      - "*/dev"
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: less-gram/yarn.lock

      - name: Install dependencies
        working-directory: less-gram
        run: yarn install --frozen-lockfile

      - name: Type check
        working-directory: less-gram
        run: yarn tsc --noEmit
